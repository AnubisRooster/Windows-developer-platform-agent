# Developer AI Platform - Configuration

agent:
  name: Developer AI Platform
  version: 2.0.0
  system_prompt: |
    You are an internal developer AI platform assistant.
    You automate engineering workflows, reason over events,
    understand repository relationships, and answer engineering
    questions using a knowledge graph.
  max_tokens: 4096
  temperature: 0.7

ironclaw:
  url: ${IRONCLAW_URL:-http://localhost:3000}
  timeout: 30
  retries: 3
  endpoints:
    interpret: /interpret
    plan: /plan
    select_tools: /select-tools
    summarize: /summarize
    health: /api/health

server:
  host: 127.0.0.1
  port: 8080
  workers: 1
  log_level: info
  log_dir: logs

database:
  url: ${DATABASE_URL:-postgresql://claw:claw@localhost:5432/clawagent}
  path: data/platform.db
  echo: false
  pool_size: 5

redis:
  url: ${REDIS_URL:-redis://localhost:6379/0}
  stream_key: platform:events
  consumer_group: platform-workers

embeddings:
  provider: ${EMBEDDING_PROVIDER:-openai}
  model: ${EMBEDDING_MODEL:-text-embedding-3-small}
  dimensions: 1536
  chunk_size: 1000
  chunk_overlap: 200

knowledge:
  graph:
    node_types:
      - repository
      - file
      - commit
      - pull_request
      - jira_issue
      - pipeline
      - documentation
      - engineer
    edge_types:
      - repo_contains_file
      - file_modified_by_commit
      - commit_part_of_pr
      - pr_links_to_issue
      - repo_deployed_by_pipeline
      - authored_by
      - reviewed_by
      - assigned_to
      - documents_repo

integrations:
  slack:
    enabled: true
    signing_secret: ${SLACK_SIGNING_SECRET}
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}

  github:
    enabled: true
    token: ${GITHUB_TOKEN}
    webhook_secret: ${GITHUB_WEBHOOK_SECRET}

  jira:
    enabled: true
    url: ${JIRA_URL}
    user: ${JIRA_USER}
    api_token: ${JIRA_API_TOKEN}
    webhook_secret: ${JIRA_WEBHOOK_SECRET}

  confluence:
    enabled: true
    url: ${CONFLUENCE_URL}
    user: ${CONFLUENCE_USER}
    api_token: ${CONFLUENCE_API_TOKEN}

  jenkins:
    enabled: true
    url: ${JENKINS_URL}
    user: ${JENKINS_USER}
    api_token: ${JENKINS_API_TOKEN}
    webhook_secret: ${JENKINS_WEBHOOK_SECRET}

  gmail:
    enabled: true
    credentials_file: credentials.json
    token_file: token.json

workflows:
  dir: workflows
  auto_load: true
  default_timeout: 60
